<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WC2026 Match Surprise Explorer</title>
</head>
<body>
<div style="width: 100%; max-width: 980px; margin: 0 auto; font-family: 'Liberation Sans', Arial, sans-serif;">
  <div style="text-align: center; font-size: 15px; color: #52514e; padding: 6px 0 2px;">FIFA World Cup 2026 &mdash; Match Surprise Explorer</div>

  <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; margin: 6px 0 8px; font-size: 13px; color: #2c2c2a;">
    <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 11px; height: 11px; border-radius: 50%; background: #2a78d6;"></span>Within expectation</span>
    <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 11px; height: 11px; border-radius: 50%; background: #1baf7a;"></span>Prediction variance</span>
    <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 11px; height: 11px; border-radius: 50%; background: #eda100;"></span>Unexpected result</span>
    <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 11px; height: 11px; border-radius: 50%; background: #e34948;"></span>Totally unexpected</span>
  </div>

  <div style="display: flex; gap: 16px; align-items: stretch;">
    <div style="position: relative; flex: 1 1 auto; min-width: 0; height: 540px;">
      <canvas id="quadChart" role="img" aria-label="Scatter plot of World Cup 2026 matches. Hover for a summary, click a point for full detail.">Loading chart&hellip;</canvas>
    </div>
    <div style="flex: 0 0 210px; display: flex; flex-direction: column; gap: 12px;">

      <div style="display: flex; flex-direction: column; gap: 6px;">
        <label for="stagePick" style="font-weight: 700; font-size: 13px; color: #3d3d3a;">Stage</label>
        <select id="stagePick" style="width: 100%; padding: 5px; border: 1px solid #c3c2b7; border-radius: 5px; font-size: 12.5px; font-family: inherit; color: #2c2c2a;"></select>
      </div>

      <div style="display: flex; flex-direction: column; gap: 6px;">
        <label for="teamPick" style="font-weight: 700; font-size: 13px; color: #3d3d3a;">Highlight team(s)</label>
        <select id="teamPick" multiple style="width: 100%; height: 150px; padding: 4px; border: 1px solid #c3c2b7; border-radius: 5px; font-size: 12.5px; font-family: inherit; color: #2c2c2a;"></select>
        <button id="clearBtn" style="padding: 5px 10px; border: 1px solid #d1d5db; border-radius: 5px; background: #f3f4f6; font-size: 12px; cursor: pointer; color: #374151;">Clear teams</button>
      </div>

      <div id="detailPanel" style="border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #1f2937; background: #ffffff; min-height: 150px;">
        <div style="color: #898781; font-style: italic;">Click any point to see the full match breakdown here.</div>
      </div>

    </div>
  </div>
  <div style="text-align: right; font-size: 12px; font-style: italic; color: #898781; padding: 4px 8px 6px 0;">Ruben Urena &middot; Own Analysis</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
const FONT_FAMILY = "'Liberation Sans', Arial, sans-serif";
const baseColors = {"Within expectation": "#2a78d6", "Prediction variance": "#1baf7a", "Unexpected result": "#eda100", "Totally unexpected": "#e34948"};
const fadeColors = {"Within expectation": "#c3d6ef", "Prediction variance": "#bfe6d6", "Unexpected result": "#f6e2b0", "Totally unexpected": "#f4cdcc"};
const D1MED = 0.1462, D2MED = 1.087;
const ALL_STAGES = "__ALL__";

let allData = [], stageFilter = ALL_STAGES, selectedTeams = new Set(), chart = null;

const medianLines = {
  id: "medianLines",
  afterDraw(chart) {
    const {ctx, chartArea:{top,bottom,left,right}, scales:{x,y}} = chart;
    const D1MED = 0.1731, D2MED = 1.1213;
    const px=x.getPixelForValue(D1MED), py=y.getPixelForValue(D2MED);
    
    ctx.save(); ctx.setLineDash([6,5]); ctx.lineWidth=1; ctx.strokeStyle="#c3c2b7";
    ctx.beginPath(); ctx.moveTo(px,top); ctx.lineTo(px,bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(left,py); ctx.lineTo(right,py); ctx.stroke();
    ctx.restore();
  }
};

function stageScoped(){ return stageFilter===ALL_STAGES ? allData : allData.filter(d=>d.Stage===stageFilter); }
function isHit(d){ if(selectedTeams.size===0) return true; return selectedTeams.has(d.Home)||selectedTeams.has(d.Away); }

function buildDatasets(){
  const pool=stageScoped(), anySel=selectedTeams.size>0;
  return Object.keys(baseColors).map(q=>({
    label:q,
    data: pool.filter(d=>d.Q===q).map(d=>({x:d.d1,y:d.d2,rec:d,hit:isHit(d)})),
    backgroundColor:(ctx)=>{const hit=ctx.raw?ctx.raw.hit:true; return hit?baseColors[q]:fadeColors[q];},
    pointRadius:(ctx)=>(anySel&&ctx.raw&&ctx.raw.hit?7:5),
    pointHoverRadius:8,
    borderColor:(ctx)=>(anySel&&ctx.raw&&ctx.raw.hit?"#2c2c2a":"#ffffff"),
    borderWidth:(ctx)=>(anySel&&ctx.raw&&ctx.raw.hit?1.4:1),
    datalabels:{
      display:(ctx)=>(anySel&&ctx.dataset.data[ctx.dataIndex].hit),
      align:"top", anchor:"end", offset:4,
      font:{size:10, family:FONT_FAMILY},
      color:"#2c2c2a", formatter:(v)=>v.rec.Match
    }
  }));
}

function oddsRow(label, str){
  // str like "69% 21% 10%" -> H D A
  const parts=(str||"").trim().split(/\s+/);
  const h=parts[0]||"-", d=parts[1]||"-", a=parts[2]||"-";
  return "<div style='display:flex; justify-content:space-between; gap:8px;'>"+
    "<span style='color:#52514e;'>"+label+"</span>"+
    "<span style='font-variant-numeric:tabular-nums; white-space:nowrap; text-align:right;'>"+h+" | "+d+" | "+a+"</span></div>";
}

function showDetail(d){
  const panel=document.getElementById("detailPanel");
  panel.innerHTML =
    "<div style='font-weight:700; font-size:13px; margin-bottom:2px;'>"+d.Match+"</div>"+
    "<div style='color:#898781; margin-bottom:8px;'>"+d.Stage+"</div>"+
    "<div style='display:flex; flex-direction:column; gap:5px;'>"+
      "<div style='display:flex; justify-content:space-between; gap:8px;'>"+
        "<span style='color:#52514e;'>Expectancy</span>"+
        "<span style='font-weight:700; color:"+baseColors[d.Q]+"; text-align:right;'>"+d.Q+"</span></div>"+
      oddsRow("Pre-odds ", d.PreOdds)+
      oddsRow("Post-odds", d.PostOdds)+
      "<div style='display:flex; justify-content:space-between; gap:8px;'>"+
        "<span style='color:#52514e;'>Prob (" + (d.Match.match(/\d+-\d+/) || ["exact score"])[0] + ")</span>"+
        "<span style='font-weight:700;'>"+d["P(exact score)"]+"</span></div>"+
    "</div>";
}

function populateTeams(){
  const teamSel=document.getElementById("teamPick"), pool=stageScoped();
  const teams=Array.from(new Set(pool.flatMap(d=>[d.Home,d.Away]))).sort();
  const prev=new Set(Array.from(teamSel.selectedOptions).map(o=>o.value));
  teamSel.innerHTML="";
  teams.forEach(t=>{const o=document.createElement("option"); o.value=t; o.textContent=t; if(prev.has(t))o.selected=true; teamSel.appendChild(o);});
  selectedTeams=new Set(Array.from(teamSel.selectedOptions).map(o=>o.value));
}
function refresh(){ chart.data.datasets=buildDatasets(); chart.update(); }

fetch("data.json").then(r=>r.json()).then(data=>{
  allData=data;
  const stages=Array.from(new Set(allData.map(d=>d.Stage)));
  const stageSel=document.getElementById("stagePick");
  const allOpt=document.createElement("option"); allOpt.value=ALL_STAGES; allOpt.textContent="All stages"; stageSel.appendChild(allOpt);
  stages.forEach(s=>{const o=document.createElement("option"); o.value=s; o.textContent=s; stageSel.appendChild(o);});
  stageSel.addEventListener("change",()=>{stageFilter=stageSel.value; populateTeams(); refresh();});

  populateTeams();
  const teamSel=document.getElementById("teamPick");
  teamSel.addEventListener("change",()=>{selectedTeams=new Set(Array.from(teamSel.selectedOptions).map(o=>o.value)); refresh();});
  document.getElementById("clearBtn").addEventListener("click",()=>{Array.from(teamSel.options).forEach(o=>o.selected=false); selectedTeams=new Set(); refresh();});

  const allD1=allData.map(d=>d.d1), allD2=allData.map(d=>d.d2);
  const xMax=Math.ceil((Math.max(...allD1)+0.02)*10)/10;
  const yMin=Math.floor((Math.min(...allD2)-0.02)*10)/10;
  const yMax=Math.ceil((Math.max(...allD2)+0.02)*10)/10;

  // Fully explicitly defined axis title font to ensure exact alignment between X and Y axes
  const axisTitleFont = {size:13, family:FONT_FAMILY, weight:"normal", style:"normal", lineHeight: 1.2};

  chart=new Chart(document.getElementById("quadChart"),{
    type:"scatter", data:{datasets:buildDatasets()},
    options:{
      responsive:true, maintainAspectRatio:false, layout:{padding:10},
      font:{family:FONT_FAMILY},
      onClick:(e,els)=>{ if(els.length){ const el=els[0]; const d=chart.data.datasets[el.datasetIndex].data[el.index].rec; showDetail(d);} },
      scales:{
        x:{
          title:{display:true,text:"\u0394\u2081 \u2014 How differently did the game unfold vs expected?",color:"#3d3d3a",font:axisTitleFont}, 
          min:0,max:xMax, ticks:{color:"#898781",font:{family:FONT_FAMILY}}, grid:{color:"#e1e0d9"}, border:{display:false}
        },
        y:{
          title:{display:true,text:"\u0394\u2082 \u2014 How much did the score defy the run of play?",color:"#3d3d3a",font:axisTitleFont}, 
          min:yMin,max:yMax, ticks:{color:"#898781",font:{family:FONT_FAMILY}}, grid:{color:"#e1e0d9"}, border:{display:false}
        }
      },
      plugins:{
        legend:{display:false},
        tooltip:{
          titleFont:{family:FONT_FAMILY}, bodyFont:{family:FONT_FAMILY},
          callbacks:{
            title:(items)=> items[0].raw.rec.Match,
            label:(ctx)=>{ const d=ctx.raw.rec; return ["(click point for detail)"]; }
          }
        },
        datalabels:{display:false}
      }
    },
    plugins:[medianLines, ChartDataLabels]
  });
}).catch(err=>{ document.getElementById("quadChart").outerHTML="<p style='color:#b13230'>Could not load data.json: "+err+"</p>"; });
</script>
</body>
</html>
